<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(${juego.nombre} + ' - Detalle')}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/layout :: header}"></th:block>

    <main>
        <div class="detail-container">
            <div class="detail-image">
                <img th:if="${juego.imagenUrl != null and !juego.imagenUrl.isEmpty()}" th:src="${juego.imagenUrl}" alt="Imagen de juego">
                <div th:unless="${juego.imagenUrl != null and !juego.imagenUrl.isEmpty()}" style="width: 100%; height: 100%; min-height: 400px; display:flex; align-items:center; justify-content:center; background:#1e293b;">
                    <span style="color:var(--text-secondary); font-size:1.5rem">Sin Imagen</span>
                </div>
            </div>
            
            <div class="detail-info">
                <h2 class="detail-title" th:text="${juego.nombre}">Nombre del juego</h2>
                <div class="detail-meta">
                    <span class="badge" th:text="${juego.plataforma}">Plataforma</span>
                    <span class="badge" th:text="'Año ' + ${juego.anyo}">Año 20XX</span>
                </div>
                
                <div class="detail-desc" th:text="${juego.descripcionLarga}">
                    Descripción larga del videojuego. Aquí se mostrará un texto completo sobre la historia, mecánicas y otros detalles relevantes de esta obra.
                </div>
                
                <div class="detail-actions">
                    <a href="javascript:history.back()" class="btn btn-secondary">Volver</a>
                    <a th:href="@{/juego/editar/{id}(id=${juego.id})}" class="btn btn-primary">Editar</a>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
